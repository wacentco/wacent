services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: WACENT
      POSTGRES_USER: WACENT
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U WACENT"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: apps/api/.env
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    env_file: apps/worker/.env
    volumes:
      - ./apps/worker/src:/app/apps/worker/src
      - ./packages:/app/packages
    restart: unless-stopped

  web-app:
    build:
      context: .
      dockerfile: apps/web-app/Dockerfile
    depends_on:
      - api
    ports:
      - "3000:3000"
    env_file: apps/web-app/.env.local
    restart: unless-stopped

  web-marketing:
    build:
      context: .
      dockerfile: apps/web-marketing/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_CONTACT_EMAIL: hello@wacent.io
    ports:
      - "3002:3002"
    restart: unless-stopped

volumes:
  postgres_data:
