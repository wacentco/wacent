services:
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile.vultr
    restart: always
    ports:
      - "3001:3001"
    env_file: .env.production
    dns:
      - 8.8.8.8
      - 8.8.4.4

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/worker.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - worker
