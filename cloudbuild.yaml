steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/wacent/cloud-run-source-deploy/wacent-api:$COMMIT_SHA'
      - '-f'
      - 'apps/api/Dockerfile.cloudrun'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/wacent/cloud-run-source-deploy/wacent-api:$COMMIT_SHA'
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wacent-api'
      - '--image'
      - 'asia-southeast1-docker.pkg.dev/wacent/cloud-run-source-deploy/wacent-api:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'

options:
  logging: CLOUD_LOGGING_ONLY
